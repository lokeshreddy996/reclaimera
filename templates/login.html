 <!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Login - Reclaim Era</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins, sans-serif;
background:linear-gradient(135deg,#eef5ec,#dcefe3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* LOGIN BOX */

.login-box{
background:white;
padding:40px;
width:340px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.login-box:hover{
transform:translateY(-5px);
}

.login-box h2{
margin-bottom:25px;
color:#2d5a27;
}

/* INPUT */

.login-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
transition:0.3s;
}

.login-box input:focus{
outline:none;
border-color:#2d5a27;
box-shadow:0 0 5px rgba(45,90,39,0.2);
}

/* BUTTON */

.login-box button{
width:100%;
padding:12px;
background:linear-gradient(135deg,#2d5a27,#2ecc71);
color:white;
border:none;
border-radius:25px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.login-box button:hover{
background:linear-gradient(135deg,#1f421a,#27ae60);
transform:translateY(-2px);
}

</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form method="POST" action="/login">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
