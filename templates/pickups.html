<!DOCTYPE html>
<html>

<head>
<title>Pickup Requests</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

.btn{
padding:6px 12px;
background:red;
color:white;
text-decoration:none;
border-radius:4px;
}

</style>

</head>

<body>

<h1>Pickup Requests</h1>

<a href="/admin">Back to Admin</a>

<br><br>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Weight</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for p in pickups %}

<tr>
<td>{{p.id}}</td>
<td>{{p.name}}</td>
<td>{{p.phone}}</td>
<td>{{p.address}}</td>
<td>{{p.weight}}</td>
<td>{{p.date}}</td>

<td>
<a href="/admin/delete-pickup/{{p.id}}" class="btn">Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
